name: Main

on:
  push:
    branches:
      - master

jobs:
  checks:
    runs-on: ubuntu-latest

    steps:
      - uses: superdispatch/actions/prepare-node-repo@v2
        with:
          pnpm-version: 10
      - run: pnpm tsc
      - run: pnpm lint
      - run: pnpm test
      - uses: codecov/codecov-action@v2
